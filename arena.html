<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="favicon-32.png" sizes="32x32">
  <link rel="icon" href="favicon-128.png" sizes="128x128">
  <link rel="icon" href="favicon-167.png" sizes="167x167">
  <link rel="icon" href="favicon-192.png" sizes="192x192">

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/widgets.css">

  <script src="jquery/jquery-3.5.1.slim.min.js"></script>

  <script src="ammo/ammo-20210414.wasm.js"></script>

  <script src="babylon/4.2.1/babylon.js"></script>
  <script src="babylon/4.2.1/babylon.gui.min.js"></script>
  <script src="pep/0.4.3/pep.min.js"></script>

  <script src="js/msg.js"></script>
  <script src="js/common/widgets.js"></script>

  <title>Robotics Arena</title>

  <style>
    .browse-bots-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .browse-bots-overlay.active { opacity: 1; }

    .browse-bots-modal {
      background: #1a1a2e;
      color: #eee;
      border-radius: 12px;
      max-width: 720px;
      width: 94%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transform: scale(0.95);
      transition: transform 0.2s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .browse-bots-overlay.active .browse-bots-modal { transform: scale(1); }

    .browse-bots-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #2a2a4e;
    }
    .browse-bots-header h3 { margin: 0; font-size: 16px; font-weight: 600; }
    .browse-bots-close {
      background: none; border: none; color: #888; cursor: pointer;
      font-size: 20px; padding: 0 4px; line-height: 1;
    }
    .browse-bots-close:hover { color: #eee; }

    .browse-bots-toolbar {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-bottom: 1px solid #2a2a4e;
      align-items: center;
    }
    .browse-bots-search {
      flex: 1;
      background: #252540;
      border: 1px solid #3a3a5e;
      border-radius: 6px;
      color: #eee;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
    }
    .browse-bots-search:focus { border-color: #7c8fff; }
    .browse-bots-search::placeholder { color: #666; }

    .browse-bots-sort {
      background: #252540;
      border: 1px solid #3a3a5e;
      border-radius: 6px;
      color: #eee;
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .browse-bots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      padding: 16px 20px;
      overflow-y: auto;
      flex: 1;
    }
    .browse-bots-grid::-webkit-scrollbar { width: 6px; }
    .browse-bots-grid::-webkit-scrollbar-track { background: transparent; }
    .browse-bots-grid::-webkit-scrollbar-thumb { background: #3a3a5e; border-radius: 3px; }

    .bot-card {
      background: #252540;
      border: 1px solid #3a3a5e;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
      overflow: hidden;
    }
    .bot-card:hover {
      transform: translateY(-2px);
      border-color: #7c8fff;
    }
    .bot-card.loading {
      opacity: 0.5;
      pointer-events: none;
    }

    .bot-card-preview {
      width: 100%;
      aspect-ratio: 4/3;
      background: #1e1e36;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bot-card-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bot-card-preview .fallback {
      font-size: 36px;
      opacity: 0.4;
    }

    .bot-card-body { padding: 10px 12px; }
    .bot-card-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bot-card-owner {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .bot-card-stats {
      font-size: 11px;
      color: #666;
      margin-top: 6px;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .bot-card-stats span { white-space: nowrap; }

    .browse-bots-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #888;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    .browse-bots-toggle input {
      accent-color: #7c8fff;
      cursor: pointer;
    }
    .browse-bots-toggle:hover { color: #bbb; }

    .bot-card.used-bot .bot-card-preview::after {
      content: 'USED';
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(124,143,255,0.85);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }
    .bot-card-preview { position: relative; }

    .bot-card.hide-used { display: none; }

    .browse-bots-empty {
      text-align: center;
      padding: 40px 20px;
      color: #666;
      grid-column: 1 / -1;
    }
    .browse-bots-error {
      text-align: center;
      padding: 40px 20px;
      color: #f66;
      grid-column: 1 / -1;
    }
  </style>
</head>

<body>
  <header>
    <div>Robotics Arena</div>
    <ul class="panelTabs">
      <li id="navBots" class="active">Bots</li>
      <li id="navArena">Arena</li>
    </ul>
    <div class="menuBar">
      <div class="menuItem optionsMenu">Options</div>
      <div class="menuItem worldsMenu">Worlds</div>
    </div>
  </header>

  <main>
    <div class="panels">

      <div class="panel botsPanel active" aria-labelledby="navBots">
        <div class="botsRow">
          <div class="bot">
            <iframe id="player0Frame" src="arenaFrame.html?player=0"></iframe>
          </div>
          <div class="bot">
            <iframe id="player2Frame" src="arenaFrame.html?player=2"></iframe>
          </div>
        </div>
        <div class="botsRow">
          <div class="bot">
            <iframe id="player1Frame" src="arenaFrame.html?player=1"></iframe>
          </div>
          <div class="bot">
            <iframe id="player3Frame" src="arenaFrame.html?player=3"></iframe>
          </div>
        </div>
      </div>

      <div class="panel" aria-labelledby="navArena">
        <canvas id="renderCanvas" touch-action="none"></canvas>
        <div class="startSim"><span class="icon-play"></span></div>
        <div class="stopSim"><span class="icon-stop"></span></div>
        <div class="world"><span class="icon-globe"></div>
        <div class="reset"><span class="icon-reset"></span></div>
        <div class="cameraSelectorShort closed">
          <div class="camera">
            <span class="icon-cameraArc"></span>
          </div>
          <div class="cameraOptions cameraTop">
            <span class="icon-cameraTop"></span>
          </div>
          <div class="cameraOptions cameraArc">
            <span class="icon-cameraArc"></span>
          </div>
        </div>

        <div class="worldInfo hide"></div>

        <div class="fps"></div>

        <div class="console">
          <div class="chevron"></div>
          <div class="clear">&#x239a;</div>
          <pre class="content"></pre>
        </div>
      </div>
    </div>
  </main>

  <script src="js/worlds/World_Base.js?v=4"></script>
  <script src="js/worlds/world_Grid.js"></script>
  <script src="js/worlds/world_Maze.js"></script>
  <script src="js/worlds/world_Arena.js"></script>
  <script src="js/worlds/world_Custom.js"></script>
  <script src="js/worlds/world_Football.js"></script>
  <script src="js/worlds/world_BattleBots.js"></script>
  <script src="js/worlds/extra/world_Image.js"></script>
  <script src="js/robotComponents.js?v=5"></script>
  <script src="js/robotTemplates.js"></script>
  <script src="js/Wheel.js?v=6"></script>
  <script src="js/Robot.js?v=6"></script>
  <script>
    var robots = [];

    for (let i=0; i<4; i++) {
      var robot = new Robot();
      robot.options = robotTemplates[0];
      robot.player = i;
      robot.disabled = true;
      robots.push(robot);
    }
    robot = robots[0];

    var playerFrames = [];
    for (let i=0; i<4; i++) {
      let ele = document.getElementById('player' + i + 'Frame');
      if (ele) {
        playerFrames.push(ele.contentWindow);
      }
    }
    // Browse Shared Bots - full-screen modal
    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      var d = new Date(dateStr);
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    var _browseBotPlayer = null;
    var _browseDebounce = null;
    var _browseOverlay = null;
    var _hideUsed = false;

    function getUsedBots() {
      try {
        return JSON.parse(localStorage.getItem('arena_used_bots') || '[]');
      } catch(e) { return []; }
    }

    function markBotUsed(shareToken) {
      var used = getUsedBots();
      if (used.indexOf(shareToken) === -1) {
        used.push(shareToken);
        localStorage.setItem('arena_used_bots', JSON.stringify(used));
      }
    }

    function isBotUsed(shareToken) {
      return getUsedBots().indexOf(shareToken) !== -1;
    }

    function openBrowseBots(player) {
      _browseBotPlayer = player;

      // Create overlay
      var overlay = document.createElement('div');
      overlay.className = 'browse-bots-overlay';
      _browseOverlay = overlay;

      var modal = document.createElement('div');
      modal.className = 'browse-bots-modal';

      // Header
      var header = document.createElement('div');
      header.className = 'browse-bots-header';
      header.innerHTML = '<h3>Browse Shared Bots</h3>';
      var closeBtn = document.createElement('button');
      closeBtn.className = 'browse-bots-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.onclick = closeBrowseBots;
      header.appendChild(closeBtn);
      modal.appendChild(header);

      // Toolbar: search + sort
      var toolbar = document.createElement('div');
      toolbar.className = 'browse-bots-toolbar';

      var searchInput = document.createElement('input');
      searchInput.type = 'text';
      searchInput.className = 'browse-bots-search';
      searchInput.placeholder = 'Search bots...';
      searchInput.addEventListener('input', function() {
        clearTimeout(_browseDebounce);
        _browseDebounce = setTimeout(function() {
          fetchBrowseBots(searchInput.value, sortSelect.value, grid);
        }, 300);
      });
      toolbar.appendChild(searchInput);

      var sortSelect = document.createElement('select');
      sortSelect.className = 'browse-bots-sort';
      sortSelect.innerHTML = '<option value="recent">Newest</option><option value="popular">Popular</option>';
      sortSelect.addEventListener('change', function() {
        fetchBrowseBots(searchInput.value, sortSelect.value, grid);
      });
      toolbar.appendChild(sortSelect);

      var toggleLabel = document.createElement('label');
      toggleLabel.className = 'browse-bots-toggle';
      var toggleCb = document.createElement('input');
      toggleCb.type = 'checkbox';
      toggleCb.checked = _hideUsed;
      toggleCb.addEventListener('change', function() {
        _hideUsed = toggleCb.checked;
        applyUsedFilter(grid);
      });
      toggleLabel.appendChild(toggleCb);
      toggleLabel.appendChild(document.createTextNode('New only'));
      toolbar.appendChild(toggleLabel);

      modal.appendChild(toolbar);

      // Grid
      var grid = document.createElement('div');
      grid.className = 'browse-bots-grid';
      grid.innerHTML = '<div class="browse-bots-empty">Loading...</div>';
      modal.appendChild(grid);

      overlay.appendChild(modal);
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeBrowseBots();
      });
      document.body.appendChild(overlay);

      // Trigger animation
      requestAnimationFrame(function() {
        overlay.classList.add('active');
      });

      // Escape key
      document.addEventListener('keydown', _browseEscHandler);

      // Initial fetch
      fetchBrowseBots('', 'recent', grid);
    }

    function _browseEscHandler(e) {
      if (e.key === 'Escape') closeBrowseBots();
    }

    function closeBrowseBots() {
      document.removeEventListener('keydown', _browseEscHandler);
      if (_browseOverlay) {
        _browseOverlay.classList.remove('active');
        setTimeout(function() {
          if (_browseOverlay && _browseOverlay.parentNode) {
            _browseOverlay.parentNode.removeChild(_browseOverlay);
          }
          _browseOverlay = null;
        }, 200);
      }
    }

    function applyUsedFilter(grid) {
      var cards = grid.querySelectorAll('.bot-card');
      for (var i = 0; i < cards.length; i++) {
        if (_hideUsed && cards[i].classList.contains('used-bot')) {
          cards[i].classList.add('hide-used');
        } else {
          cards[i].classList.remove('hide-used');
        }
      }
    }

    function fetchBrowseBots(search, sort, grid) {
      var apiBase = window.location.origin;
      var url = apiBase + '/api/v1/battlebots/robots?sort=' + encodeURIComponent(sort);
      if (search) {
        url += '&search=' + encodeURIComponent(search);
      }

      grid.innerHTML = '<div class="browse-bots-empty">Loading...</div>';

      fetch(url)
        .then(function(res) { return res.json(); })
        .then(function(result) {
          var bots = result.data || result;
          if (!bots || bots.length === 0) {
            grid.innerHTML = '<div class="browse-bots-empty">' +
              (search ? 'No bots match your search.' : 'No shared bots available yet.') +
              '</div>';
            return;
          }

          grid.innerHTML = '';
          bots.forEach(function(bot) {
            var card = document.createElement('div');
            var used = isBotUsed(bot.share_token);
            card.className = 'bot-card' + (used ? ' used-bot' : '') + (used && _hideUsed ? ' hide-used' : '');

            var previewHtml;
            if (bot.preview_path) {
              previewHtml = '<div class="bot-card-preview"><img src="/storage/' + escapeHtml(bot.preview_path) + '?proxy=1" onerror="this.parentNode.innerHTML=\'<div class=fallback>&#129302;</div>\'"></div>';
            } else {
              previewHtml = '<div class="bot-card-preview"><div class="fallback">&#129302;</div></div>';
            }

            var views = bot.view_count || 0;
            var likes = bot.like_count || 0;
            var dateStr = formatDate(bot.created_at);

            card.innerHTML = previewHtml +
              '<div class="bot-card-body">' +
                '<div class="bot-card-title">' + escapeHtml(bot.title || 'Untitled Bot') + '</div>' +
                '<div class="bot-card-owner">' + escapeHtml(bot.owner_name || 'Anonymous') + '</div>' +
                '<div class="bot-card-stats">' +
                  '<span title="Views">&#128065; ' + views + '</span>' +
                  '<span title="Likes">&#10084; ' + likes + '</span>' +
                  '<span>' + escapeHtml(dateStr) + '</span>' +
                '</div>' +
              '</div>';

            card.addEventListener('click', function() {
              selectBrowseBot(bot.share_token, card, grid);
            });

            grid.appendChild(card);
          });
        })
        .catch(function(err) {
          grid.innerHTML = '<div class="browse-bots-error">Failed to load bots.</div>';
          console.error('Browse bots error:', err);
        });
    }

    function selectBrowseBot(shareToken, card, grid) {
      // Disable all cards while loading
      var cards = grid.querySelectorAll('.bot-card');
      for (var i = 0; i < cards.length; i++) {
        cards[i].classList.add('loading');
      }

      var apiBase = window.location.origin;
      fetch(apiBase + '/api/v1/gallery/' + encodeURIComponent(shareToken))
        .then(function(res) { return res.json(); })
        .then(function(result) {
          var project = result.data || result;
          var projectData = project.project_data || project.data;

          if (typeof projectData === 'string') {
            projectData = JSON.parse(projectData);
          }

          if (!projectData) {
            alert('Could not load bot data.');
            // Re-enable cards
            for (var i = 0; i < cards.length; i++) {
              cards[i].classList.remove('loading');
            }
            return;
          }

          var title = project.title || 'Shared Bot';

          // Record this bot as used
          markBotUsed(shareToken);

          // Call into the correct player iframe
          if (playerFrames[_browseBotPlayer] && playerFrames[_browseBotPlayer].loadBotData) {
            playerFrames[_browseBotPlayer].loadBotData(projectData, title);
          }

          closeBrowseBots();
        })
        .catch(function(err) {
          alert('Failed to load bot data.');
          console.error('Load shared bot error:', err);
          for (var i = 0; i < cards.length; i++) {
            cards[i].classList.remove('loading');
          }
        });
    }
  </script>
  <script src="js/babylon.js"></script>
  <script src="js/botsPanel.js"></script>
  <script src="js/arenaPanel.js"></script>
  <script src="js/arena.js"></script>

</body>
</html>
